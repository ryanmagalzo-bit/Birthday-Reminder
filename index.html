<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>🎂 Birthday Reminder | Never Forget Special Days</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
      background: #fdf6e3;
    }

    /* Cake Background Pattern */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(255, 200, 150, 0.15) 0%, transparent 30%),
        radial-gradient(circle at 90% 70%, rgba(255, 180, 120, 0.12) 0%, transparent 35%);
      pointer-events: none;
      z-index: 0;
    }

    /* Floating Cake Icons */
    .floating-cakes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .cake-float {
      position: absolute;
      font-size: 30px;
      opacity: 0.2;
      animation: floatCake 20s infinite ease-in-out;
    }

    @keyframes floatCake {
      0%, 100% { 
        transform: translateY(100vh) rotate(0deg); 
        opacity: 0;
      }
      10% { opacity: 0.2; }
      90% { opacity: 0.2; }
      100% { 
        transform: translateY(-20vh) rotate(360deg); 
        opacity: 0;
      }
    }

    /* Cake Emoji positions */
    .cake-float:nth-child(1) { left: 5%; animation-duration: 18s; font-size: 40px; }
    .cake-float:nth-child(2) { left: 20%; animation-duration: 22s; font-size: 35px; animation-delay: 2s; }
    .cake-float:nth-child(3) { left: 35%; animation-duration: 15s; font-size: 45px; animation-delay: 4s; }
    .cake-float:nth-child(4) { left: 50%; animation-duration: 25s; font-size: 30px; animation-delay: 1s; }
    .cake-float:nth-child(5) { left: 65%; animation-duration: 19s; font-size: 50px; animation-delay: 3s; }
    .cake-float:nth-child(6) { left: 80%; animation-duration: 21s; font-size: 38px; animation-delay: 5s; }
    .cake-float:nth-child(7) { left: 95%; animation-duration: 17s; font-size: 42px; animation-delay: 2.5s; }
    .cake-float:nth-child(8) { left: 12%; animation-duration: 28s; font-size: 28px; animation-delay: 6s; }
    .cake-float:nth-child(9) { left: 45%; animation-duration: 24s; font-size: 35px; animation-delay: 3.5s; }
    .cake-float:nth-child(10) { left: 75%; animation-duration: 20s; font-size: 32px; animation-delay: 4.5s; }

    /* Main Container */
    .app-container {
      max-width: 600px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* Glass Card Effect with Cake Frosting Theme */
    .glass-card {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(10px);
      border-radius: 48px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255, 245, 220, 0.8);
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .glass-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.3);
    }

    /* Header with Cake Gradient */
    .app-header {
      background: linear-gradient(135deg, #f5a623 0%, #f7c56e 50%, #f5a623 100%);
      padding: 40px 32px;
      color: white;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .app-header::before {
      content: '🎂🎈🎁';
      position: absolute;
      font-size: 100px;
      opacity: 0.15;
      bottom: -10px;
      right: -10px;
      transform: rotate(-10deg);
      white-space: nowrap;
    }

    .app-header::after {
      content: '✨';
      position: absolute;
      font-size: 60px;
      opacity: 0.2;
      top: 10px;
      left: 10px;
    }

    .app-header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }

    .app-header p {
      font-size: 1rem;
      opacity: 0.95;
      font-weight: 500;
    }

    /* Panels */
    .auth-panel, .dashboard-panel {
      padding: 32px 28px;
    }

    /* Auth Cards */
    .auth-wrapper {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .auth-card {
      background: white;
      border-radius: 32px;
      padding: 28px 24px;
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
      border: 1px solid rgba(245, 166, 35, 0.2);
    }

    .auth-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 40px -12px rgba(245, 166, 35, 0.25);
      border-color: rgba(245, 166, 35, 0.4);
    }

    .auth-card h2 {
      font-size: 1.8rem;
      margin-bottom: 24px;
      color: #8B5A2B;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
    }

    .auth-card h2 i {
      color: #f5a623;
      font-size: 1.8rem;
    }

    /* Input Groups */
    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #d4a373;
      font-size: 1.1rem;
      transition: color 0.3s ease;
    }

    .input-group input {
      width: 100%;
      padding: 14px 18px 14px 48px;
      border: 2px solid #f0e0c0;
      border-radius: 60px;
      font-size: 1rem;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
      background: #fffef8;
    }

    .input-group input:focus {
      outline: none;
      border-color: #f5a623;
      box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.15);
    }

    .input-group input:focus + i {
      color: #f5a623;
    }

    /* Buttons */
    .btn-primary {
      background: linear-gradient(135deg, #f5a623 0%, #f7c56e 100%);
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 60px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn-primary:hover::before {
      width: 300px;
      height: 300px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(245, 166, 35, 0.5);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .logout-btn {
      background: linear-gradient(135deg, #e89f3e 0%, #d48a2b 100%);
      padding: 10px 24px;
      width: auto;
      font-size: 0.9rem;
    }

    /* Dashboard Header */
    .dash-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 2px solid #f0e0c0;
    }

    .dash-header h2 {
      font-size: 1.8rem;
      color: #8B5A2B;
      font-weight: 600;
    }

    .dash-header h2 i {
      color: #f5a623;
      margin-right: 10px;
    }

    /* Add Birthday Card */
    .add-birthday-card {
      background: linear-gradient(135deg, #fffaf0 0%, #fff5e6 100%);
      border-radius: 32px;
      padding: 24px;
      margin-bottom: 32px;
      border: 1px solid rgba(245, 166, 35, 0.3);
    }

    .add-birthday-card h3 {
      color: #8B5A2B;
      margin-bottom: 20px;
      font-size: 1.3rem;
      font-weight: 600;
    }

    .flex-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .flex-row .input-group {
      flex: 1;
      margin-bottom: 0;
    }

    .flex-row .input-group input {
      padding: 12px 18px 12px 45px;
    }

    /* Birthday List */
    .birthday-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-height: 450px;
      overflow-y: auto;
      padding-right: 5px;
    }

    /* Custom Scrollbar */
    .birthday-list::-webkit-scrollbar {
      width: 6px;
    }

    .birthday-list::-webkit-scrollbar-track {
      background: #f0e0c0;
      border-radius: 10px;
    }

    .birthday-list::-webkit-scrollbar-thumb {
      background: #f5a623;
      border-radius: 10px;
    }

    .birthday-card {
      background: white;
      border-radius: 24px;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s ease;
      border: 1px solid #f0e0c0;
      animation: slideIn 0.5s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .birthday-card:hover {
      transform: translateX(5px);
      border-color: #f5a623;
      box-shadow: 0 10px 25px -5px rgba(245, 166, 35, 0.2);
    }

    .birthday-info {
      flex: 1;
    }

    .birthday-name {
      font-weight: 700;
      font-size: 1.2rem;
      color: #5c3d1a;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .birthday-name i {
      color: #f5a623;
      font-size: 1.2rem;
    }

    .birthday-date {
      font-size: 0.85rem;
      color: #a07a50;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .birthday-date i {
      color: #f5a623;
      font-size: 0.85rem;
    }

    .days-left {
      background: linear-gradient(135deg, #f5a623 0%, #f7c56e 100%);
      padding: 5px 14px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 600;
      color: white;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .birthday-actions {
      display: flex;
      gap: 10px;
    }

    .btn-icon {
      padding: 8px 16px;
      font-size: 0.8rem;
      width: auto;
      border-radius: 40px;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .btn-edit {
      background: #fef3e2;
      color: #d48a2b;
    }

    .btn-edit:hover {
      background: #f5a623;
      color: white;
      transform: scale(1.05);
    }

    .btn-delete {
      background: #fff0f0;
      color: #e89f3e;
    }

    .btn-delete:hover {
      background: #e89f3e;
      color: white;
      transform: scale(1.05);
    }

    /* Messages */
    .error-msg {
      background: linear-gradient(135deg, #fed7d7 0%, #feb2b2 100%);
      color: #c53030;
      padding: 12px 20px;
      border-radius: 60px;
      font-size: 0.85rem;
      margin: 12px 0;
      text-align: center;
      font-weight: 500;
    }

    .success-msg {
      background: linear-gradient(135deg, #d4f5d4 0%, #b8e6b8 100%);
      color: #2d6a2d;
    }

    .loading-state, .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #a07a50;
      background: #fffaf0;
      border-radius: 32px;
    }

    .loading-state i, .empty-state i {
      font-size: 3rem;
      color: #f5a623;
      margin-bottom: 15px;
      display: block;
    }

    /* Footer */
    footer {
      background: #fef3e2;
      text-align: center;
      padding: 20px;
      font-size: 0.8rem;
      color: #a07a50;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    footer i {
      color: #f5a623;
    }

    /* Responsive */
    @media (max-width: 550px) {
      body { padding: 12px; }
      .auth-panel, .dashboard-panel { padding: 24px 20px; }
      .app-header h1 { font-size: 1.8rem; }
      .auth-card h2 { font-size: 1.4rem; }
      .flex-row { flex-direction: column; }
      .flex-row .input-group { margin-bottom: 12px; }
      .birthday-card { flex-direction: column; align-items: flex-start; gap: 15px; }
      .birthday-actions { width: 100%; justify-content: flex-end; }
      .dash-header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .logout-btn { align-self: flex-start; }
    }
  </style>
</head>
<body>
<div class="floating-cakes">
  <div class="cake-float">🎂</div>
  <div class="cake-float">🍰</div>
  <div class="cake-float">🎂</div>
  <div class="cake-float">🧁</div>
  <div class="cake-float">🎂</div>
  <div class="cake-float">🍰</div>
  <div class="cake-float">🎂</div>
  <div class="cake-float">🧁</div>
  <div class="cake-float">🎂</div>
  <div class="cake-float">🍰</div>
</div>

<div class="app-container">
  <div class="glass-card">
    <div class="app-header">
      <h1>
        <i class="fas fa-birthday-cake"></i>
        Birthday Reminder
        <i class="fas fa-candy-cane"></i>
      </h1>
      <p>Never forget a special day — celebrate every moment with joy</p>
    </div>

    <!-- Auth Panel -->
    <div id="authPanel" class="auth-panel">
      <div class="auth-wrapper">
        <div class="auth-card">
          <h2><i class="fas fa-sign-in-alt"></i> Welcome Back</h2>
          <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="loginEmail" placeholder="Email address">
          </div>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="loginPassword" placeholder="Password">
          </div>
          <div id="loginError" class="error-msg" style="display: none;"></div>
          <button id="loginBtn" class="btn-primary">
            <i class="fas fa-arrow-right"></i> Login
          </button>
        </div>
        <div class="auth-card">
          <h2><i class="fas fa-user-plus"></i> Create Account</h2>
          <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="signupName" placeholder="Full name">
          </div>
          <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="signupEmail" placeholder="Email address">
          </div>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="signupPassword" placeholder="Password (min 6 chars)">
          </div>
          <div id="signupError" class="error-msg" style="display: none;"></div>
          <button id="signupBtn" class="btn-primary">
            <i class="fas fa-check-circle"></i> Sign Up
          </button>
        </div>
      </div>
    </div>

    <!-- Dashboard Panel -->
    <div id="dashboardPanel" class="dashboard-panel" style="display: none;">
      <div class="dash-header">
        <h2><i class="fas fa-calendar-alt"></i> My Birthday List</h2>
        <button id="logoutDashBtn" class="btn-primary logout-btn">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </div>

      <div class="add-birthday-card">
        <h3><i class="fas fa-plus-circle"></i> Add New Birthday</h3>
        <div class="flex-row">
          <div class="input-group">
            <i class="fas fa-user-friends"></i>
            <input type="text" id="birthdayName" placeholder="Full name">
          </div>
          <div class="input-group">
            <i class="fas fa-calendar-day"></i>
            <input type="date" id="birthdayDate">
          </div>
          <button id="addBirthdayBtn" class="btn-primary">
            <i class="fas fa-gift"></i> Add
          </button>
        </div>
      </div>

      <div id="birthdaysContainer">
        <div class="loading-state">
          <i class="fas fa-spinner fa-pulse"></i>
          <p>Loading your special memories...</p>
        </div>
      </div>
    </div>

    <footer>
      <span><i class="fas fa-shield-alt"></i> JWT Secure</span>
      <span><i class="fas fa-lock"></i> bcrypt Hashed</span>
      <span><i class="fas fa-database"></i> JSON Server</span>
      <span><i class="fas fa-birthday-cake"></i> Made with Love</span>
    </footer>
  </div>
</div>

<script>
  const API_BASE = '/api';
  let authToken = localStorage.getItem('birthday_token');
  let currentUser = null;

  const authPanel = document.getElementById('authPanel');
  const dashboardPanel = document.getElementById('dashboardPanel');
  const loginBtn = document.getElementById('loginBtn');
  const signupBtn = document.getElementById('signupBtn');
  const logoutDashBtn = document.getElementById('logoutDashBtn');
  const addBirthdayBtn = document.getElementById('addBirthdayBtn');
  const birthdaysContainer = document.getElementById('birthdaysContainer');

  function updateUI() {
    if (authToken && currentUser) {
      authPanel.style.display = 'none';
      dashboardPanel.style.display = 'block';
      fetchBirthdays();
    } else {
      authPanel.style.display = 'block';
      dashboardPanel.style.display = 'none';
    }
  }

  function showMessage(container, message, isError = true) {
    const msgDiv = document.createElement('div');
    msgDiv.className = `error-msg ${!isError ? 'success-msg' : ''}`;
    msgDiv.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
    container.prepend(msgDiv);
    setTimeout(() => msgDiv.remove(), 3000);
  }

  async function signupUser(name, email, password) {
    const res = await fetch(`${API_BASE}/auth/signup`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);
    return data;
  }

  async function loginUser(email, password) {
    const res = await fetch(`${API_BASE}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);
    return data;
  }

  async function fetchBirthdays() {
    if (!authToken) return;
    birthdaysContainer.innerHTML = '<div class="loading-state"><i class="fas fa-spinner fa-pulse"></i><p>Loading your special memories...</p></div>';
    try {
      const res = await fetch(`${API_BASE}/birthdays`, {
        headers: { 'Authorization': `Bearer ${authToken}` }
      });
      if (res.status === 401) handleUnauthorized();
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);
      renderBirthdays(data);
    } catch (err) {
      birthdaysContainer.innerHTML = `<div class="error-msg">⚠️ ${err.message}</div>`;
    }
  }

  async function addBirthday(name, date) {
    const res = await fetch(`${API_BASE}/birthdays`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${authToken}`
      },
      body: JSON.stringify({ name, date })
    });
    if (res.status === 401) handleUnauthorized();
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);
    return data;
  }

  async function updateBirthday(id, name, date) {
    const res = await fetch(`${API_BASE}/birthdays/${id}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${authToken}`
      },
      body: JSON.stringify({ name, date })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);
    return data;
  }

  async function deleteBirthday(id) {
    const res = await fetch(`${API_BASE}/birthdays/${id}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${authToken}` }
    });
    if (!res.ok) throw new Error('Delete failed');
    return true;
  }

  function handleUnauthorized() {
    localStorage.removeItem('birthday_token');
    localStorage.removeItem('birthday_user');
    authToken = null;
    currentUser = null;
    updateUI();
  }

  function getDaysUntilNextBirthday(dateStr) {
    const today = new Date();
    const birthday = new Date(dateStr);
    const nextBirthday = new Date(today.getFullYear(), birthday.getMonth(), birthday.getDate());
    if (nextBirthday < today) {
      nextBirthday.setFullYear(today.getFullYear() + 1);
    }
    const diffTime = nextBirthday - today;
    return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function renderBirthdays(birthdays) {
    if (!birthdays.length) {
      birthdaysContainer.innerHTML = `<div class="empty-state"><i class="fas fa-birthday-cake"></i><p>No birthdays yet! Add your first reminder above.</p></div>`;
      return;
    }
    
    const sorted = [...birthdays].sort((a, b) => {
      return getDaysUntilNextBirthday(a.date) - getDaysUntilNextBirthday(b.date);
    });
    
    birthdaysContainer.innerHTML = `<div class="birthday-list">${sorted.map(bday => {
      const daysLeft = getDaysUntilNextBirthday(bday.date);
      let daysText = '';
      let icon = 'fa-calendar-day';
      if (daysLeft === 0) {
        daysText = 'TODAY! 🎉';
        icon = 'fa-celebration';
      } else if (daysLeft === 1) {
        daysText = 'Tomorrow! 🌟';
        icon = 'fa-clock';
      } else {
        daysText = `${daysLeft} days left`;
        icon = 'fa-hourglass-half';
      }
      return `
        <div class="birthday-card">
          <div class="birthday-info">
            <div class="birthday-name">
              <i class="fas fa-birthday-cake"></i>
              ${escapeHtml(bday.name)}
              <span class="days-left"><i class="fas ${icon}"></i> ${daysText}</span>
            </div>
            <div class="birthday-date">
              <i class="fas fa-calendar-alt"></i>
              ${formatDate(bday.date)}
            </div>
          </div>
          <div class="birthday-actions">
            <button class="btn-icon btn-edit" data-id="${bday.id}" data-name="${escapeHtml(bday.name)}" data-date="${bday.date}">
              <i class="fas fa-edit"></i> Edit
            </button>
            <button class="btn-icon btn-delete" data-id="${bday.id}">
              <i class="fas fa-trash"></i> Delete
            </button>
          </div>
        </div>
      `;
    }).join('')}</div>`;
    
    document.querySelectorAll('.btn-edit').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        const id = btn.dataset.id;
        const oldName = btn.dataset.name;
        const oldDate = btn.dataset.date;
        const newName = prompt('Edit name:', oldName);
        if (!newName) return;
        const newDate = prompt('Edit date (YYYY-MM-DD):', oldDate);
        if (!newDate) return;
        try {
          await updateBirthday(id, newName, newDate);
          await fetchBirthdays();
          showMessage(document.querySelector('.add-birthday-card'), '✨ Birthday updated successfully!', false);
        } catch (err) {
          showMessage(document.querySelector('.add-birthday-card'), err.message, true);
        }
      });
    });
    
    document.querySelectorAll('.btn-delete').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        const id = btn.dataset.id;
        if (confirm('Remove this birthday reminder?')) {
          try {
            await deleteBirthday(id);
            await fetchBirthdays();
            showMessage(document.querySelector('.add-birthday-card'), '🗑 Birthday removed successfully', false);
          } catch (err) {
            showMessage(document.querySelector('.add-birthday-card'), err.message, true);
          }
        }
      });
    });
  }

  loginBtn.addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errorDiv = document.getElementById('loginError');
    errorDiv.style.display = 'none';
    if (!email || !password) {
      errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Email and password required';
      errorDiv.style.display = 'block';
      return;
    }
    try {
      const data = await loginUser(email, password);
      authToken = data.token;
      currentUser = data.user;
      localStorage.setItem('birthday_token', authToken);
      localStorage.setItem('birthday_user', JSON.stringify(currentUser));
      document.getElementById('loginEmail').value = '';
      document.getElementById('loginPassword').value = '';
      updateUI();
    } catch (err) {
      errorDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${err.message}`;
      errorDiv.style.display = 'block';
    }
  });

  signupBtn.addEventListener('click', async () => {
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const errorDiv = document.getElementById('signupError');
    errorDiv.style.display = 'none';
    if (!name || !email || !password) {
      errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> All fields required';
      errorDiv.style.display = 'block';
      return;
    }
    if (password.length < 6) {
      errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Password must be at least 6 characters';
      errorDiv.style.display = 'block';
      return;
    }
    try {
      await signupUser(name, email, password);
      document.getElementById('signupName').value = '';
      document.getElementById('signupEmail').value = '';
      document.getElementById('signupPassword').value = '';
      showMessage(document.querySelector('.auth-wrapper'), '✅ Account created successfully! Please login.', false);
    } catch (err) {
      errorDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${err.message}`;
      errorDiv.style.display = 'block';
    }
  });

  addBirthdayBtn.addEventListener('click', async () => {
    const name = document.getElementById('birthdayName').value.trim();
    const date = document.getElementById('birthdayDate').value;
    if (!name || !date) {
      alert('Please enter a name and birthday date');
      return;
    }
    try {
      await addBirthday(name, date);
      document.getElementById('birthdayName').value = '';
      document.getElementById('birthdayDate').value = '';
      await fetchBirthdays();
      showMessage(document.querySelector('.add-birthday-card'), '🎉 Birthday added successfully!', false);
    } catch (err) {
      showMessage(document.querySelector('.add-birthday-card'), err.message, true);
    }
  });

  logoutDashBtn.addEventListener('click', () => {
    localStorage.removeItem('birthday_token');
    localStorage.removeItem('birthday_user');
    authToken = null;
    currentUser = null;
    updateUI();
  });

  const storedToken = localStorage.getItem('birthday_token');
  const storedUser = localStorage.getItem('birthday_user');
  if (storedToken && storedUser) {
    authToken = storedToken;
    try { currentUser = JSON.parse(storedUser); } catch(e) {}
  }
  updateUI();
</script>
</body>
</html>
